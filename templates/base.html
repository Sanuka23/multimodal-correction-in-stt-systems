<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ASR Correction{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-6 py-3">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <a href="/dashboard" class="text-lg font-semibold text-gray-900">ASR Correction</a>
            <div class="flex gap-4 text-sm">
                <a href="/dashboard" class="text-gray-600 hover:text-gray-900">Dashboard</a>
                <a href="/dashboard/compare" class="text-gray-600 hover:text-gray-900">Compare</a>
                <a href="/dashboard/jobs" class="text-gray-600 hover:text-gray-900">Jobs</a>
                <a href="/dashboard/training" class="text-gray-600 hover:text-gray-900">Training</a>
                <a href="/docs" class="text-gray-600 hover:text-gray-900">API Docs</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
